<!-- Notifications Page Template (Injected into main-content) -->
<div id="notifications-page" class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">All Notifications</h1>
            <p class="text-sm text-gray-500">Manage and filter your system notifications</p>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="markAllAsRead()"
                class="px-4 py-2 text-sm font-semibold text-primary bg-indigo-50 hover:bg-indigo-100 rounded-lg transition-colors">
                Mark all as read
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-wrap items-center gap-2">
        <button onclick="filterNotifications('all')"
            class="filter-btn active px-4 py-2 text-sm font-medium rounded-lg bg-indigo-50 text-primary border border-primary/10">All</button>
        <button onclick="filterNotifications('order')"
            class="filter-btn px-4 py-2 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50">Orders</button>
        <button onclick="filterNotifications('review')"
            class="filter-btn px-4 py-2 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50">Reviews</button>
        <button onclick="filterNotifications('ticket')"
            class="filter-btn px-4 py-2 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50">Tickets</button>
        <button onclick="filterNotifications('contact')"
            class="filter-btn px-4 py-2 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50">Contacts</button>
    </div>

    <!-- Notifications Table -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-100">
                    <tr>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Type</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Notification
                        </th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Date</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">
                            Actions</th>
                    </tr>
                </thead>
                <tbody id="notifications-table-body" class="divide-y divide-gray-50">
                    <!-- Data injected via JS -->
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="p-4 border-t border-gray-50 flex items-center justify-between">
            <p id="pagination-info" class="text-sm text-gray-500">Showing 0 of 0 notifications</p>
            <div class="flex items-center gap-2">
                <button id="prev-page"
                    class="p-2 rounded-lg border border-gray-200 text-gray-400 hover:bg-gray-50 disabled:opacity-50">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i>
                </button>
                <button id="next-page"
                    class="p-2 rounded-lg border border-gray-200 text-gray-400 hover:bg-gray-50 disabled:opacity-50">
                    <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </div>
</div>
